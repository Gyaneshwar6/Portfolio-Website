<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You Tube</title>
    <link rel="stylesheet" href="Project7.css" />
  </head>
  <body>
    <div class="container">
      <aside>
        <div class="leftcont">
          <div class="menu"></div>
          <br><br>
          <div class="home"></div>
          <h1>Home</h1>
          <br><br>
          <div class="explore"></div>
          <h1>Explore</h1>
          <br><br>
          <div class="subscription"></div>
          <h1>subscription</h1>
          <br><br>
          <div class="library"></div>
          <h1>Library</h1>
          <br><br>
        </div>
      </aside>
      <div class="main_container">
        
      <header>
        <div class="navbar">
          <div class="logo">
            <img src="youtube-logo.png" alt="youtube-logo" />
          </div>
          <div class="center_nav">
            <div class="search">
              <input type="text" />
              <button>
                <img src="search.svg" alt="Search" />
              </button>
            </div>
            <div class="mic">
              <img src="mic.svg" alt="Mic" />
            </div>
          </div>

          <div class="side_nav">
            <i>
              <img src="video-add.svg" alt="" />
            </i>
            <i>
              <img src="dot-grid.svg" alt="" />
            </i>
            <i>
              <img src="bell.svg" alt="Bell icon" />
            </i>
            <i>
              <img src="id.png" alt="Profile" />
            </i>
          </div>
        </div>
        <div class="tags">
          <div class="tag dark">All</div>
          <div class="tag light">Mixes</div>
          <div class="tag light">Crypto</div>
          <div class="tag light">Html</div>
          <div class="tag light">Css</div>
          <div class="tag light">Pyton</div>
        </div>
      </header>
      <main>
        <div class="thumb_container">
          
        </div>
      </main>
      </div>

    </div>
  </body>
</html>
